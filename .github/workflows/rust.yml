name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  fmt:
    name: Formatting
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: false

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - run: cargo +nightly fmt -- --check

  check:
    name: Check
    if: github.event_name == 'pull_request'
    needs: fmt
    uses: ./.github/workflows/build.yml
    with:
      check-only: true

  build:
    name: Build
    if: github.event_name == 'push'
    needs: fmt
    uses: ./.github/workflows/build.yml
    
    with:
      version-suffix: "-beta"
      upload-artifacts: true