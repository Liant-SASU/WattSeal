name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    name: Verify Code Formatting
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: false

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Run Format Check
        run: cargo +nightly fmt -- --check

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: Copy-Item target/release/WattSeal.exe WattSeal-windows.exe

      - name: Upload Windows Beta Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: beta-windows
          path: WattSeal-windows.exe

  check-linux:
    name: Build (Linux)
    runs-on: ubuntu-20.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev pkg-config \
            libxkbcommon-dev libwayland-dev

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          cp target/release/WattSeal WattSeal-linux
          chmod +x WattSeal-linux

      - name: Upload Linux Beta Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: beta-linux
          path: WattSeal-linux

  check-macos:
    name: Build (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          cp target/release/WattSeal WattSeal-macos
          chmod +x WattSeal-macos

      - name: Upload macOS Beta Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: beta-macos
          path: WattSeal-macos
